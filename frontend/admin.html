<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NexGen — Admin Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#04080f;color:white;font-family:'DM Sans';display:flex;margin:0}
.sidebar{width:220px;background:#0b1120;height:100vh;padding:20px}
.main{flex:1}
.topbar{height:60px;background:#0b1120;padding:15px}
.content{padding:20px}

.card{background:#0b1120;padding:20px;border-radius:12px;margin-bottom:20px}
input,select{width:100%;padding:10px;margin:8px 0;background:#111827;color:white;border:1px solid #1e2d47;border-radius:8px}
button{padding:10px;border:none;border-radius:8px;background:#00d4ff;color:black;cursor:pointer}
table{width:100%;margin-top:10px}
td,th{padding:8px}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Admin Panel</h3>
</div>

<div class="main">

<div class="topbar">Dashboard</div>

<div class="content">

<!-- ================= CREATE USER ================= -->
<div class="card">
  <h3>Create User</h3>

  <input id="new_username" placeholder="Username">
  <input id="new_password" placeholder="Password">

  <select id="new_role">
    <option value="ADMIN">Admin</option>
    <option value="DOCTOR">Doctor</option>
    <option value="PATIENT">Patient</option>
  </select>

  <button onclick="createUser()">Create User</button>
</div>

<!-- ================= STATS ================= -->
<div class="card">
  <h3>Stats</h3>
  <p>Total Patients: <span id="dTP">0</span></p>
  <p>Doctors: <span id="dDr">0</span></p>
  <p>Appointments: <span id="dUA">0</span></p>
</div>

<!-- ================= APPOINTMENTS ================= -->
<div class="card">
  <h3>Appointments</h3>
  <table>
    <thead>
      <tr><th>Time</th><th>Patient</th><th>Doctor</th></tr>
    </thead>
    <tbody id="dashApptTbl"></tbody>
  </table>
</div>

<!-- ================= CHART ================= -->
<div class="card">
  <canvas id="apptChart"></canvas>
</div>

</div>
</div>

<script src="js/api.js"></script>

<script>

// ================= INIT =================
async function init(){
  if(!API.requireRole("ADMIN")) return;
  loadData();
}

// ================= LOAD DATA =================
async function loadData(){
  try{
    const patients = await API.getPatients();
    const doctors = await API.getDoctors();
    const appts = await API.getAppointments();

    dTP.textContent = patients.length;
    dDr.textContent = doctors.length;
    dUA.textContent = appts.length;

    dashApptTbl.innerHTML = appts.slice(0,5).map(a=>`
      <tr>
        <td>${a.appointment_time || "-"}</td>
        <td>${a.patient_username}</td>
        <td>${a.doctor_username}</td>
      </tr>
    `).join("");

    buildChart(appts);

  }catch(e){
    toast("Failed to load data","error");
    console.error(e);
  }
}

// ================= CREATE USER =================
async function createUser(){
  const username = new_username.value;
  const password = new_password.value;
  const role = new_role.value;

  if(!username || !password){
    toast("Fill all fields","error");
    return;
  }

  try{
    await API.createUser({username,password,role});
    toast("User created","success");

    new_username.value="";
    new_password.value="";

  }catch(e){
    toast("Failed","error");
  }
}

// ================= CHART =================
function buildChart(appts){
  const months = new Array(12).fill(0);

  appts.forEach(a=>{
    if(!a.appointment_date) return;
    const m = new Date(a.appointment_date).getMonth();
    months[m]++;
  });

  new Chart(document.getElementById("apptChart"),{
    type:"line",
    data:{
      labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
      datasets:[{data:months,borderColor:"#00d4ff"}]
    }
  });
}

init();

</script>

</body>
</html>

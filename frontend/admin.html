<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NexGen — Admin Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#04080f;--surface:#0b1120;--border:#1e2d47;
--accent:#00d4ff;--green:#00e5a0;--red:#ff4757;
--amber:#ffa500;--text:#e8f0fe;--muted:#6b7fa3
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans';background:var(--bg);color:var(--text);display:flex}

.sidebar{width:240px;background:var(--surface);height:100vh;position:fixed}
.main{margin-left:240px;flex:1}

.topbar{height:60px;background:var(--surface);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border)}

.content{padding:20px}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.sc{background:var(--surface);padding:20px;border-radius:12px}

.card{background:var(--surface);border-radius:12px;margin-bottom:20px}
.ch{padding:14px;border-bottom:1px solid var(--border)}
.cb{padding:20px}

button{padding:6px 12px;border:none;border-radius:6px;background:#111827;color:#fff;cursor:pointer}
button.active{background:var(--accent);color:#000}

table{width:100%}
td,th{padding:8px}
</style>
</head>

<body>

<div class="sidebar">
  <div style="padding:20px;font-weight:bold">Admin</div>
</div>

<div class="main">

<div class="topbar">Dashboard</div>

<div class="content">

<!-- FILTERS -->
<div style="display:flex;gap:10px;margin-bottom:20px">
  <button onclick="setFilter(event,'today')">Today</button>
  <button onclick="setFilter(event,'week')">Week</button>
  <button onclick="setFilter(event,'month')">Month</button>
  <button onclick="setFilter(event,'all')" class="active">All</button>
</div>

<!-- STATS -->
<div class="sg">
  <div class="sc"><div>Total Patients</div><h2 id="dTP">—</h2></div>
  <div class="sc"><div>Admitted</div><h2 id="dAP">—</h2></div>
  <div class="sc"><div>Doctors</div><h2 id="dDr">—</h2></div>
  <div class="sc"><div>Appointments</div><h2 id="dUA">—</h2></div>
</div>

<!-- TABLE -->
<div class="card">
<div class="ch">Appointments</div>
<div class="cb">
<table>
<thead><tr><th>Time</th><th>Patient</th><th>Doctor</th></tr></thead>
<tbody id="dashApptTbl"></tbody>
</table>
</div>
</div>

<!-- CHARTS -->
<div class="card"><div class="ch">Appointments</div><div class="cb"><canvas id="apptChart"></canvas></div></div>
<div class="card"><div class="ch">Patients</div><div class="cb"><canvas id="patientChart"></canvas></div></div>
<div class="card"><div class="ch">Doctor Workload</div><div class="cb"><canvas id="doctorChart"></canvas></div></div>
<div class="card"><div class="ch">Revenue</div><div class="cb"><canvas id="revenueChart"></canvas></div></div>

</div>
</div>

<script src="js/api.js"></script>

<script>
let allPats=[],allDocs=[],allAppts=[];
let apptChart,patientChart,doctorChart,revenueChart;
let currentFilter='all';

// INIT
async function init(){
 if(!API.requireRole('admin')) return;
 await loadAll();
}

// LOAD
async function loadAll(){
 allPats=await API.getPatients();
 allDocs=await API.getDoctors();
 allAppts=await API.getAppointments();

 buildDash();
 buildCharts();
 buildAdvanced();
}

// FILTER
function setFilter(e,type){
 currentFilter=type;

 document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
 e.target.classList.add('active');

 buildCharts();
 buildAdvanced();
}

// FILTER LOGIC
function getFiltered(){
 const now=new Date();

 return allAppts.filter(a=>{
   if(!a.appointmentDate) return false;
   const d=new Date(a.appointmentDate);

   if(currentFilter==='today') return d.toDateString()===now.toDateString();

   if(currentFilter==='week'){
     return (now-d)/(1000*60*60*24)<=7;
   }

   if(currentFilter==='month'){
     return d.getMonth()===now.getMonth();
   }

   return true;
 });
}

// DASH
function buildDash(){
 dTP.textContent=allPats.length;
 dAP.textContent=allPats.filter(p=>p.status==='ADMITTED').length;
 dDr.textContent=allDocs.length;
 dUA.textContent=allAppts.length;

 dashApptTbl.innerHTML=allAppts.slice(0,5).map(a=>`
 <tr>
 <td>${a.appointmentTime||'-'}</td>
 <td>${a.patientName||a.patientUsername}</td>
 <td>${a.doctorName||a.doctorUsername}</td>
 </tr>`).join('');
}

// BASIC CHARTS
function buildCharts(){
 const filtered=getFiltered();

 const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
 const counts=new Array(12).fill(0);

 filtered.forEach(a=>{
   const m=new Date(a.appointmentDate).getMonth();
   counts[m]++;
 });

 if(apptChart) apptChart.destroy();

 apptChart=new Chart(document.getElementById('apptChart'),{
   type:'line',
   data:{labels:months,datasets:[{data:counts,borderColor:'#00d4ff'}]}
 });

 const stat={ADMITTED:0,DISCHARGED:0,CRITICAL:0,OUTPATIENT:0};

 allPats.forEach(p=>{
   if(stat[p.status]!=undefined) stat[p.status]++;
 });

 if(patientChart) patientChart.destroy();

 patientChart=new Chart(document.getElementById('patientChart'),{
   type:'doughnut',
   data:{labels:Object.keys(stat),datasets:[{data:Object.values(stat)}]}
 });
}

// ADVANCED
function buildAdvanced(){
 const filtered=getFiltered();

 // doctor
 const map={};
 filtered.forEach(a=>{
   const d=a.doctorName||a.doctorUsername;
   map[d]=(map[d]||0)+1;
 });

 if(doctorChart) doctorChart.destroy();

 doctorChart=new Chart(document.getElementById('doctorChart'),{
   type:'bar',
   data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}
 });

 // revenue
 const rev=new Array(12).fill(0);

 filtered.forEach(a=>{
   if(a.status!=='COMPLETED') return;
   const m=new Date(a.appointmentDate).getMonth();
   rev[m]+=(a.consultationFee||500);
 });

 if(revenueChart) revenueChart.destroy();

 revenueChart=new Chart(document.getElementById('revenueChart'),{
   type:'bar',
   data:{labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],datasets:[{data:rev}]}
 });
}

init();
</script>

</body>
</html>
